<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOAHBNTT — Photographe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Bricolage+Grotesque:wdth,wght@75..100,200..800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* ── PALETTE VERTE VINTAGE ── */
    :root {
      --bg:        #1a1f1a;   /* vert forêt très sombre */
      --bg2:       #222820;   /* légèrement plus clair pour sections alternées */
      --surface:   #2a3028;   /* cartes, nav */
      --green:     #4e6b4a;   /* vert mousse accent */
      --green-lt:  #7a9e74;   /* vert clair */
      --cream:     #e8e2d4;   /* crème — texte principal */
      --muted:     #7a8a76;   /* texte secondaire */
      --white-top: rgba(232,226,212,0.92); /* bande blanche héro */
      --nav-h:     56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-variation-settings: 'wght' 340, 'wdth' 100;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: none;
    }

    /* ── BRUIT DE FOND GLOBAL (S'applique sur toutes les couleurs et sections) ── */
    .site-grain {
      position: fixed;
      inset: 0;
      z-index: 9998; /* Placé juste en dessous du curseur mais au-dessus de tout le reste */
      pointer-events: none;
      opacity: 0.12; /* Ajustement pour un grain élégant et homogène */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
    }

    /* Tout le contenu principal */
    nav, .nav-mobile, .mobile-menu, .hero, section, footer, .cursor, .lightbox {
      position: relative;
    }

    /* ── CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--green-lt);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
    }
    .cursor.expanded { width: 36px; height: 36px; opacity: 0.18; }

    /* ── NAV desktop ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      z-index: 200;
      background: rgba(26, 31, 26, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74, 107, 74, 0.25);
    }

    .nav-links { display: flex; gap: 32px; list-style: none; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 12px;
      font-variation-settings: 'wght' 500, 'wdth' 100;
      transition: color 0.3s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--green-lt); }

    .nav-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--green-lt);
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .nav-links a.active .nav-dot { opacity: 1; }

    /* ── NAV mobile ── */
    .nav-mobile {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
      background: rgba(26, 31, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74, 107, 74, 0.2);
    }

    .nav-mobile-logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.02em;
      color: var(--cream);
      text-decoration: none;
    }

    .hamburger {
      display: flex; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 24px; height: 1.5px;
      background: var(--cream);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── MENU OVERLAY MOBILE MODIFIÉ ── */
    .mobile-menu {
      display: none;
      position: fixed; inset: 0;
      background: rgba(20, 25, 20, 0.98);
      z-index: 190;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .mobile-menu.open { opacity: 1; }
    .mobile-menu a {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-variation-settings: 'wght' 340, 'wdth' 100; /* Identique à la page d'accueil */
      font-size: 28px;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .mobile-menu a:hover { color: var(--green-lt); }

    /* ── HERO ── */
    .hero {
      display: flex; flex-direction: column;
      padding-top: var(--nav-h);
      position: relative;
    }

    .hero-bg-shared {
      position: absolute; inset: 0;
      background-image: url('photos/hero.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.7;
      z-index: 0;
    }

    /* Bande 1 : crème semi-transparent */
    .hero-top {
      position: relative; z-index: 1;
      background: var(--white-top);
      display: flex;
      align-items: center; justify-content: center;
      padding: 10px 24px;
    }

    .hero-title {
      font-family: 'Plus Jakarta Sans', sans-serif; /* Police arrondie et moderne */
      font-weight: 800;
      font-size: clamp(32px, 5.5vw, 64px);
      line-height: 1;
      letter-spacing: -0.01em;
      color: #1a1f1a;
      text-transform: uppercase;
    }

    /* Bande 2 : vert sombre semi-transparent */
    .hero-bottom {
      position: relative; z-index: 1;
      background: rgba(20, 26, 20, 0.82);
      display: flex;
      align-items: center; justify-content: center;
      padding: 36px 60px;
      min-height: 130px;
      border-top: 1px solid rgba(74, 107, 74, 0.3);
    }

    .hero-sub {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-variation-settings: 'wght' 700, 'wdth' 100;
      font-size: clamp(18px, 2.8vw, 36px);
      line-height: 1.25;
      color: var(--cream);
      text-align: center;
      letter-spacing: 0.01em;
      max-width: 820px;
    }

    /* ── SECTIONS ── */
    section { padding: 100px 80px 70px; }
    section:nth-child(even) { background: var(--bg2); }

    .section-header {
      display: flex; align-items: center;
      gap: 20px; margin-bottom: 50px;
    }

    .section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-variation-settings: 'wght' 700, 'wdth' 100;
      font-size: 28px;
      letter-spacing: 0.06em;
      color: var(--green-lt);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section-line { flex: 1; height: 1px; background: var(--green); opacity: 0.4; }

    /* ── GALLERY ── */
    .gallery { columns: 4; column-gap: 10px; }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: none;
      border-radius: 2px;
    }

    .photo-item img {
      width: 100%; display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
